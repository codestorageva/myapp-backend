server {
    listen 80;
    server_name local-invoice.com;

    # 1. NextAuth ની રિક્વેસ્ટો - આ સીધી Next.js એપ પર જવી જોઈએ
    location /api/auth/ {
        proxy_pass http://nextjs-app:3000; # આ લાઈન બદલીને તેને frontend પર મોકલો
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. તમારી પોતાની Backend APIs
    location /api/ {
        proxy_pass http://springboot-app:8084/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Auth controllers (જો તમે ડાયરેક્ટ /auth/login વાપરતા હોવ)
    location /auth/ {
        proxy_pass http://springboot-app:8084/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 4. Frontend root
    location / {
        proxy_pass http://nextjs-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}