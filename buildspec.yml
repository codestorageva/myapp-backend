version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Installing dependencies..."
  build:
    commands:
      - echo "Building Maven project..."
      - mvn clean package -f myapp-backend/pom.xml
  post_build:
    commands:
      - echo "Copying jar file to root as app.jar"
      - cp myapp-backend/target/GST_Invoice_Builder-0.0.1-SNAPSHOT.jar app.jar
artifacts:
  files:
    - app.jar
    - Procfile
