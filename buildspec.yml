name: Build and EB Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -f myapp-backend/pom.xml

      - name: Copy JAR to root
        run: copy myapp-backend\target\GST_Invoice_Builder-0.0.1-SNAPSHOT.jar app.jar

      - name: Zip for EB
        run: powershell Compress-Archive -Path * -DestinationPath GST_Invoice_Builder_EB.zip
